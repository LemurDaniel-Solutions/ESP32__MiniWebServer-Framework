<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32 Device</title>
    <link rel="stylesheet" href="/main.css">
</head>

<body>

    <header>
        <span class="label">ESP32 MiniWebServer</span>
        <h1>Device Dashboard</h1>
        <div class="status-bar">
            <span class="status-dot" id="statusDot"></span>
            <span id="statusText">Connecting...</span>
        </div>
    </header>

    <main>

        <section class="card">
            <h2>Device Status</h2>
            <div class="stats">
                <div class="stat">
                    <span class="stat-label">Firmware</span>
                    <span class="stat-value" id="firmware">—</span>
                </div>
                <div class="stat">
                    <span class="stat-label">Uptime</span>
                    <span class="stat-value" id="uptime">—</span>
                </div>
                <div class="stat">
                    <span class="stat-label">Free Heap</span>
                    <span class="stat-value" id="freeHeap">—</span>
                </div>
                <div class="stat">
                    <span class="stat-label">WiFi RSSI</span>
                    <span class="stat-value" id="rssi">—</span>
                </div>
            </div>
        </section>

        <section class="card">
            <h2>Example Endpoints</h2>
            <div class="actions">
                <button onclick="callHello()">GET /hello</button>
                <button onclick="postData()">POST /data</button>
            </div>
            <pre id="output" class="output">Response will appear here...</pre>
        </section>

    </main>

    <script>
        async function fetchStatus() {
            try {
                const res = await fetch('/status');
                const data = await res.json();

                document.getElementById('firmware').textContent = data.firmware ?? '—';
                document.getElementById('uptime').textContent = formatUptime(data.uptime);
                document.getElementById('freeHeap').textContent = formatBytes(data.free_heap);
                document.getElementById('rssi').textContent = data.wifi_rssi + ' dBm';

                document.getElementById('statusDot').classList.add('online');
                document.getElementById('statusText').textContent = 'Online';
            } catch {
                document.getElementById('statusDot').classList.remove('online');
                document.getElementById('statusText').textContent = 'Offline';
            }
        }

        async function callHello() {
            const res = await fetch('/hello');
            document.getElementById('output').textContent = await res.text();
        }

        async function postData() {
            const res = await fetch('/data', { method: 'POST' });
            const data = await res.json();
            document.getElementById('output').textContent = JSON.stringify(data, null, 2);
        }

        function formatUptime(ms) {
            const s = Math.floor(ms / 1000);
            const h = Math.floor(s / 3600);
            const m = Math.floor((s % 3600) / 60);
            const sec = s % 60;
            return `${h}h ${m}m ${sec}s`;
        }

        function formatBytes(bytes) {
            if (bytes >= 1024 * 1024) return (bytes / 1024 / 1024).toFixed(1) + ' MB';
            if (bytes >= 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return bytes + ' B';
        }

        fetchStatus();
        setInterval(fetchStatus, 10000);
    </script>

</body>

</html>
